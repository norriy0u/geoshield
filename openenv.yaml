name: geoshield
version: "1.0.0"
description: >
  GeoShield is a geospatial SIGINT intelligence evaluation environment.
  An AI agent receives field observations and must classify anomalies,
  attribute threat sources, and recommend operational responses.
  Three tasks with increasing difficulty, graded deterministically with partial credit.

author: "Syntax Squad"
license: "MIT"

runtime:
  type: docker
  dockerfile: Dockerfile
  port: 7860
  healthcheck: /health

endpoints:
  reset:
    method: POST
    path: /reset
    description: "Start a new episode. Body: {task_id: 1|2|3, seed?: int}"
  step:
    method: POST
    path: /step
    description: "Submit an action. Body: {action: str, reasoning?: str}"
  state:
    method: GET
    path: /state
    description: "Read current episode state without advancing it."

tasks:
  - id: anomaly_detection
    task_id: 1
    description: "Classify SIGINT signal as no_anomaly, flag_for_review, or escalate_immediately."
    difficulty: easy
    max_steps: 3
    data_file: "data/task1_train.jsonl"

  - id: threat_attribution
    task_id: 2
    description: "Attribute detected signal source as benign, suspicious, hostile, or critical."
    difficulty: medium
    max_steps: 3
    data_file: "data/task2_train.jsonl"

  - id: response_recommendation
    task_id: 3
    description: "Given a threat briefing, recommend monitor, deploy_surveillance, alert_command, or immediate_intercept."
    difficulty: hard
    max_steps: 5
    data_file: "data/task3_train.jsonl"

reward_range: [0.0, 1.0]
partial_rewards: true

logging:
  format: openenv_standard
  fields: [task, env, model, step, action, reward, done, error, success, steps, score, rewards]
